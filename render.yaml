services:
  - type: web
    name: flood-prediction
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python api/flask_app.py
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.8"
      - key: DEBUG_MODE
        value: "false"
      - key: API_HOST
        value: "0.0.0.0"
      - key: EMAIL_NOTIFICATIONS_ENABLED
        value: "false"
